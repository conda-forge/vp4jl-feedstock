schema_version: 1

context:
  name: vp4jl
  version: "0.1.9"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/vp4jl-${{ version }}.tar.gz
  sha256: bd2b691f9571b320324d19ff247e1ef44c9251bd93c1a946889dad5f6d70cbe8

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling >=1.5.0
    - jupyterlab >=4.0.0b0,<5
    - hatch-nodejs-version
    - hatch-jupyter-builder
    - pip
  run:
    - python >=${{ python_min }}
    - jupyter_server >=2.0.1,<3

tests:
  - python:
      imports:
        - vp4jl
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: The JupyterLab extension providing node based visual programming environment
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/Max-ChenFei/VisualProgramming4JupyterLab

extra:
  recipe-maintainers:
    - jan-janssen
